name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: trekdesk-ai # Update with your actual GCP Project ID
  REGION: us-central1
  BACKEND_SERVICE: trekdesk-backend
  FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build and Push Container
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/repos/$BACKEND_SERVICE:latest ./trekdesk-backend-prod
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/repos/$BACKEND_SERVICE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/repos/$BACKEND_SERVICE:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: cd trekdesk-admin-dashboard && npm install

      - name: Build Frontend
        run: cd trekdesk-admin-dashboard && npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-firebase-hosting@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TREKDESK_AI }}
          channelId: live
          projectId: trekdesk-ai
