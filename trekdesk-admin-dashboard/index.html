<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 
      SEO & Browser Metadata
      - Favicon: Branding for browser tabs.
      - Viewport: Responsive design support for mobile devices.
    -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 
      Modern Web Fonts (Google Fonts)
      Preconnecting to font providers reduces latency during asset loading.
      Using Inter for UI and Montserrat for bold branding headers.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />

    <title>TrekDesk AI | Admin Dashboard</title>
  </head>
  <body>
    <!-- 
      SPA Root Injection Point
      The React application will be mounted here by the script in /src/main.tsx.
    -->
    <div id="root"></div>

    <!-- 
      Application Entry Module
      Vite uses ES modules directly during development.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
