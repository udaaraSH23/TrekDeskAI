<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 
      SEO & Browser Metadata
      - Favicon: Branding for browser tabs.
      - Viewport: Responsive design support for mobile devices.
    -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TrekDesk AI Admin Command Center - Manage your intelligent trekking guides, knowledge base, and guest conversations with a premium AI-powered interface." />
    <meta name="author" content="Axiolon Labs" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- Open Graph / social media metadata -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TrekDesk AI | Admin Dashboard" />
    <meta property="og:description" content="Premium AI Command Center for professional trekking guides." />
    <meta property="og:image" content="/favicon.png" />

    <!-- 
      Modern Web Fonts (Google Fonts)
      Preconnecting to font providers reduces latency during asset loading.
      Using Inter for UI and Montserrat for bold branding headers.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />

    <title>TrekDesk AI | Admin Dashboard</title>

    <!-- Silero VAD UMD Bundle (Bypasses Vite ESM issues) -->
    <script src="/vad/bundle.min.js"></script>
  </head>
  <body>
    <!-- 
      SPA Root Injection Point
      The React application will be mounted here by the script in /src/main.tsx.
    -->
    <div id="root"></div>

    <!-- 
      Application Entry Module
      Vite uses ES modules directly during development.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
